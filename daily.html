<!DOCTYPE html>
<html lang="mr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>श्री स्वामी समर्थ - Daily</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; }
    .page-body { flex: 1; padding: 24px 20px 40px; max-width: 1100px; margin: 0 auto; width: 100%; }
    .filter-row { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
    .filter-row input[type="date"] { padding: 9px 14px; border: 1.5px solid var(--border); border-radius: var(--r-sm); font-family: "Inter", sans-serif; font-size: 0.88rem; background: white; outline: none; transition: border-color 0.18s; color: var(--text-dark); }
    .filter-row input[type="date"]:focus { border-color: var(--saffron); }
    .total-pill { padding: 6px 14px; background: var(--saffron-bg); border: 1px solid var(--saffron-light); border-radius: 20px; font-size: 0.82rem; font-weight: 700; color: var(--text-mid); }
    .view-toolbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; margin-bottom: 22px; }
    .view-tabs { display: flex; gap: 8px; flex-wrap: wrap; }
    .view-tab { padding: 9px 18px; border-radius: 999px; border: 1.5px solid var(--border); background: var(--white); color: var(--text-mid); font-family: "Inter", sans-serif; font-size: 0.88rem; font-weight: 700; cursor: pointer; transition: all 0.18s; }
    .view-tab:hover { border-color: var(--saffron-light); background: var(--saffron-bg); }
    .view-tab.active { border-color: var(--saffron); background: linear-gradient(135deg, var(--saffron), var(--saffron-dark)); color: white; box-shadow: 0 3px 12px rgba(249,115,22,0.24); }
    .opt-summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 14px; margin-bottom: 28px; }
    .opt-summary-card { background: var(--white); border-radius: var(--r-lg); border: 1.5px solid var(--border); padding: 18px 20px; display: flex; flex-direction: column; gap: 8px; transition: all 0.18s; cursor: default; box-shadow: var(--shadow-sm); }
    .opt-summary-card:hover { border-color: var(--saffron-light); box-shadow: var(--shadow); transform: translateY(-2px); }
    .osc-top { display: flex; align-items: center; justify-content: space-between; }
    .osc-badge { width: 38px; height: 38px; border-radius: 10px; background: linear-gradient(135deg, var(--saffron), var(--saffron-dark)); color: white; font-weight: 800; font-size: 1rem; display: flex; align-items: center; justify-content: center; }
    .osc-count { font-size: 2rem; font-weight: 800; color: var(--text-dark); line-height: 1; }
    .osc-label { font-family: "Tiro Devanagari Marathi", serif; font-size: 0.78rem; color: var(--text-light); line-height: 1.4; }
    .osc-bar-wrap { height: 4px; background: var(--border); border-radius: 4px; overflow: hidden; }
    .osc-bar { height: 100%; background: linear-gradient(90deg, var(--saffron-light), var(--saffron)); border-radius: 4px; transition: width 0.6s ease; }
    .main-grid { display: grid; grid-template-columns: 1fr 300px; gap: 20px; align-items: start; }
    @media (max-width: 860px) { .main-grid { grid-template-columns: 1fr; } }
    .section-card { background: var(--white); border-radius: var(--r-lg); border: 1px solid var(--border); box-shadow: var(--shadow-sm); overflow: hidden; }
    .section-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .section-title { font-size: 0.88rem; font-weight: 700; color: var(--text-mid); }
    .opt-group-header td { background: var(--saffron-bg); padding: 8px 14px; font-weight: 700; font-size: 0.8rem; color: var(--saffron-dark); letter-spacing: 0.3px; }
    .chart-card { background: var(--white); border-radius: var(--r-lg); border: 1px solid var(--border); padding: 20px; box-shadow: var(--shadow-sm); }
    .chart-card .section-title { margin-bottom: 16px; }
    .chart-canvas-wrap { max-width: 260px; margin: 0 auto; }
    .state { text-align: center; padding: 40px 20px; color: var(--text-light); }
    .state span { font-size: 2rem; display: block; margin-bottom: 8px; }
  </style>
</head>
<body>
  <div class="top-bar">
    <button class="icon-btn" onclick="window.location.href='index.html'">← मागे</button>
    <span class="top-bar-title">श्री स्वामी समर्थ</span>
    <div style="width:80px;"></div>
  </div>

  <div class="page-body">
    <div class="filter-row">
      <span style="font-size:0.85rem;font-weight:600;color:var(--text-mid);">📅 दिनांक:</span>
      <input type="date" id="dateInput"/>
      <button class="btn btn-primary btn-sm" id="loadBtn">पहा</button>
    </div>

    <div class="view-toolbar">
      <div class="view-tabs">
        <button class="view-tab active" id="tabSeva" type="button">Swami Seva</button>
        <button class="view-tab" id="tabNamaskar" type="button">Namaskar</button>
      </div>
      <span class="total-pill" id="totalPill" style="display:none;">👥 <span id="totalNum">0</span> responses</span>
    </div>

    <div class="opt-summary-grid" id="summaryGrid"></div>

    <div class="main-grid" id="mainGrid" style="display:none;">
      <div class="section-card">
        <div class="section-header">
          <span class="section-title">विद्यार्थ्यांची यादी</span>
        </div>
        <div class="tbl-wrap" style="border-radius:0;border:none;">
          <table>
            <thead>
              <tr>
                <th style="width:40px;">#</th>
                <th>नाव / Name</th>
                <th>पर्याय</th>
                <th id="detailHead">सेवा तपशील</th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </div>

      <div class="chart-card">
        <div class="section-title" style="font-size:0.88rem;font-weight:700;color:var(--text-mid);margin-bottom:16px;">वितरण</div>
        <div class="chart-canvas-wrap">
          <canvas id="pieCanvas"></canvas>
        </div>
      </div>
    </div>

    <div class="state" id="emptyState"><span>🙏</span><p>तारीख निवडा</p></div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="config.js"></script>
  <script type="module">
    import { getResponsesByDate } from "./firebase-client.js";

    let pieChart = null;
    let currentRows = [];
    let activeQuestionId = "seva";

    document.getElementById("dateInput").value = getTodayISO();
    document.getElementById("loadBtn").addEventListener("click", load);
    document.getElementById("tabSeva").addEventListener("click", () => switchView("seva"));
    document.getElementById("tabNamaskar").addEventListener("click", () => switchView("parents_namaskar"));
    window.addEventListener("DOMContentLoaded", load);

    function switchView(questionId) {
      activeQuestionId = questionId;
      document.getElementById("tabSeva").classList.toggle("active", questionId === "seva");
      document.getElementById("tabNamaskar").classList.toggle("active", questionId === "parents_namaskar");
      render(currentRows);
    }

    async function load() {
      const date = document.getElementById("dateInput").value;
      if (!date) {
        showToast("तारीख निवडा", "error");
        return;
      }

      try {
        const rows = await getResponsesByDate(date);
        currentRows = rows;
        render(rows);
      } catch (error) {
        showToast("डेटा load झाला नाही", "error");
      }
    }

    function render(rows) {
      const question = getActiveQuestion();
      const options = getActiveOptions(question);
      const emptyState = document.getElementById("emptyState");
      const mainGrid = document.getElementById("mainGrid");
      const summaryGrid = document.getElementById("summaryGrid");
      const tbody = document.getElementById("tableBody");
      const counts = {};

      mainGrid.style.display = "none";
      summaryGrid.innerHTML = "";
      tbody.innerHTML = "";
      document.getElementById("detailHead").textContent = activeQuestionId === "seva" ? "सेवा तपशील" : "नमस्कार तपशील";

      options.forEach(opt => {
        counts[opt.id] = [];
      });

      rows.forEach(row => {
        const answer = getAnswer(row, activeQuestionId);
        if (!answer?.selectedOption) return;
        if (!counts[answer.selectedOption]) counts[answer.selectedOption] = [];
        counts[answer.selectedOption].push(row.studentName);
      });

      const total = rows.length;
      document.getElementById("totalNum").textContent = total;
      document.getElementById("totalPill").style.display = total ? "inline-flex" : "none";

      options.forEach(opt => {
        const n = (counts[opt.id] || []).length;
        const pct = total ? Math.round((n / total) * 100) : 0;
        const card = document.createElement("div");
        card.className = "opt-summary-card";
        card.innerHTML = `
          <div class="osc-top">
            <div class="osc-badge">${getOptionBadge(opt)}</div>
            <div class="osc-count">${n}</div>
          </div>
          <div class="osc-label font-marathi">${getOptionText(opt)}</div>
          <div class="osc-bar-wrap"><div class="osc-bar" style="width:${pct}%"></div></div>
        `;
        summaryGrid.appendChild(card);
      });

      if (!total) {
        emptyState.innerHTML = "<span>🙏</span><p>या दिवसाचा डेटा नाही</p>";
        emptyState.style.display = "block";
        if (pieChart) {
          pieChart.destroy();
          pieChart = null;
        }
        return;
      }

      emptyState.style.display = "none";
      mainGrid.style.display = "grid";

      let serial = 0;
      options.forEach(opt => {
        const students = counts[opt.id] || [];
        if (!students.length) return;

        const hdr = document.createElement("tr");
        hdr.className = "opt-group-header";
        hdr.innerHTML = `<td colspan="4">पर्याय ${getOptionBadge(opt)} - ${getOptionText(opt)} (${students.length})</td>`;
        tbody.appendChild(hdr);

        students.forEach(name => {
          serial++;
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td style="color:var(--text-light);font-size:0.82rem;">${serial}</td>
            <td style="font-weight:500;"> ${name}</td>
            <td><span class="badge badge-${opt.id}">${getOptionBadge(opt)}</span></td>
            <td class="font-marathi" style="font-size:0.85rem;color:var(--text-mid);">${getOptionText(opt)}</td>
          `;
          tbody.appendChild(tr);
        });
      });

      if (pieChart) pieChart.destroy();

      pieChart = new Chart(document.getElementById("pieCanvas"), {
        type: "doughnut",
        data: {
          labels: options.map(opt => getOptionBadge(opt)),
          datasets: [{
            data: options.map(opt => (counts[opt.id] || []).length),
            backgroundColor: getChartColors(options),
            borderColor: "#fff",
            borderWidth: 3,
            hoverOffset: 6
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: {
              position: "bottom",
              labels: { font: { family: "Inter", size: 11 }, padding: 10, boxWidth: 12, color: "#431407" }
            },
            tooltip: { callbacks: { label: ctx => ` ${ctx.parsed} students` } }
          },
          cutout: "55%"
        }
      });
    }

    function getActiveQuestion() {
      return CONFIG.POLL_QUESTIONS.find(question => question.id === activeQuestionId);
    }

    function getActiveOptions(question) {
      return question.options.map(option => ({
        id: option.id,
        text: option.label,
        label: option.label
      }));
    }

    function getAnswer(row, questionId) {
      if (Array.isArray(row.answers)) {
        return row.answers.find(answer => answer.questionId === questionId);
      }
      if (questionId === "seva") {
        return {
          selectedOption: row.selectedOption,
          optionText: row.optionText
        };
      }
      return null;
    }

    function getOptionBadge(option) {
      return option.id.length === 1 ? option.id : option.label;
    }

    function getOptionText(option) {
      return option.text || option.label;
    }

    function getChartColors(options) {
      const palette = ["#F97316", "#16A34A", "#3B82F6", "#EC4899", "#6B7280"];
      if (activeQuestionId === "parents_namaskar") return ["#16A34A", "#DC2626"];
      return options.map((_, index) => palette[index % palette.length]);
    }
  </script>
</body>
</html>
