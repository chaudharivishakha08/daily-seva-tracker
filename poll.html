<!DOCTYPE html>
<html lang="mr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>श्री स्वामी समर्थ - Poll</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; }
    .poll-body { flex: 1; display: flex; flex-direction: column; padding: 28px 20px 36px; max-width: 860px; width: 100%; margin: 0 auto; gap: 18px; }
    .question-list { display: grid; gap: 16px; }
    .question-card { background: var(--white); border-radius: var(--r-lg); border: 1px solid var(--border); box-shadow: var(--shadow); padding: 24px 26px; position: relative; overflow: hidden; cursor: pointer; transition: border-color 0.16s, box-shadow 0.16s, transform 0.16s; }
    .question-card::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 5px; background: linear-gradient(180deg, var(--saffron), var(--saffron-dark)); border-radius: 4px 0 0 4px; }
    .question-card:hover, .question-card.active { border-color: var(--saffron-light); box-shadow: var(--shadow-lg); transform: translateY(-1px); }
    .question-card.answered { border-color: #86EFAC; }
    .question-card.locked { opacity: 0.72; cursor: not-allowed; }
    .question-card.locked:hover { border-color: var(--border); box-shadow: var(--shadow); transform: none; }
    .question-head { display: flex; flex-direction: column; gap: 12px; align-items: flex-start; }
    .question-copy { width: 100%; }
    .q-label { font-size: 0.72rem; font-weight: 700; color: var(--saffron); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
    .q-text { font-family: "Tiro Devanagari Marathi", serif; font-size: 1.16rem; line-height: 1.7; color: var(--text-dark); }
    .answer-pill { display: none; max-width: 100%; padding: 5px 12px; border-radius: 999px; background: var(--success-bg); border: 1px solid #86EFAC; color: var(--success); font-size: 0.78rem; font-weight: 700; line-height: 1.35; white-space: normal; overflow-wrap: anywhere; }
    .question-card.answered .answer-pill { display: inline-flex; }
    .answer-options { display: none; gap: 10px; margin-top: 18px; }
    .question-card.active .answer-options { display: grid; }
    .answer-options.compact-options { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .yes-no-btn { border: 1.5px solid var(--border); background: white; border-radius: var(--r); padding: 13px 14px; font-family: "Tiro Devanagari Marathi", serif; font-size: 1.05rem; color: var(--text-dark); cursor: pointer; transition: all 0.16s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .option-circle { width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg, var(--saffron), var(--saffron-dark)); color: white; font-family: "Inter", sans-serif; font-size: 0.88rem; font-weight: 800; display: inline-flex; align-items: center; justify-content: center; flex: 0 0 auto; }
    .option-label { line-height: 1.45; }
    .yes-no-btn.option-e .option-label { white-space: nowrap; }
    .answer-options:not(.compact-options) .yes-no-btn { justify-content: flex-start; }
    .answer-options:not(.compact-options) .option-label { flex: 1; text-align: center; }
    .yes-no-btn:hover { border-color: var(--saffron-light); background: var(--saffron-bg); }
    .yes-no-btn.selected { border-color: var(--saffron); background: linear-gradient(135deg, #FFF4EC, #FEE9CE); color: var(--saffron-dark); font-weight: 700; }
    .submit-wrap { margin-top: 8px; }
    .submit-wrap .btn { width: 100%; padding: 14px; font-size: 1rem; border-radius: var(--r); }
    @media (min-width: 760px) {
      .poll-body { padding: 36px 32px; }
      .question-list { grid-template-columns: repeat(2, minmax(0, 1fr)); align-items: start; }
      .question-card { min-height: 230px; }
      .question-card { grid-column: span 2; }
      .question-head { flex-direction: row; justify-content: space-between; gap: 18px; }
      .question-copy { flex: 1; min-width: 0; }
      .answer-pill { max-width: 48%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <button class="icon-btn" onclick="history.back()">← मागे</button>
    <span class="top-bar-title">श्री स्वामी समर्थ</span>
    <div class="user-chip">
      <div class="avatar" id="userAvatar">?</div>
      <span class="user-chip-name" id="userName">...</span>
    </div>
  </div>

  <div class="poll-body">
    <div class="question-list" id="questionList"></div>

    <div class="submit-wrap">
      <button class="btn btn-primary" id="submitBtn" disabled>Submit</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="config.js"></script>
  <script type="module">
    import { saveResponse } from "./firebase-client.js";

    const answers = {};
    const student = sessionStorage.getItem("currentStudent");
    if (!student) window.location.href = "index.html";

    const initials = student
      .split(" ")
      .filter(Boolean)
      .map(namePart => namePart.charAt(0).toUpperCase())
      .join("")
      .slice(0, 2);

    document.getElementById("userName").textContent = initials;
    document.getElementById("userAvatar").textContent = initials.charAt(0) || "?";
    document.getElementById("submitBtn").addEventListener("click", submitResponse);

    renderQuestions();

    function renderQuestions() {
      const list = document.getElementById("questionList");
      list.innerHTML = "";

      CONFIG.POLL_QUESTIONS.forEach(question => {
        const card = document.createElement("div");
        card.className = "question-card";
        card.dataset.questionId = question.id;
        card.innerHTML = `
          <div class="question-head">
            <div class="question-copy">
              <div class="q-label">${question.title}</div>
              <div class="q-text">${formatQuestion(question.text)}</div>
            </div>
            <div class="answer-pill" data-answer-pill="${question.id}"></div>
          </div>
          <div class="answer-options ${question.options.length === 2 ? "compact-options" : ""}">
            ${question.options.map(option => `
              <button class="yes-no-btn ${option.id === "E" ? "option-e" : ""}" type="button" data-question-id="${question.id}" data-option-id="${option.id}">
                ${option.id.length === 1 ? `<span class="option-circle">${option.id}</span>` : ""}
                <span class="option-label">${option.label}</span>
              </button>
            `).join("")}
          </div>
        `;

        card.addEventListener("click", event => {
          if (!event.target.closest(".yes-no-btn")) {
            openQuestion(question.id);
          }
        });

        card.querySelectorAll(".yes-no-btn").forEach(button => {
          button.addEventListener("click", event => {
            event.stopPropagation();
            selectAnswer(button.dataset.questionId, button.dataset.optionId);
          });
        });

        list.appendChild(card);
      });

      setActiveQuestion(CONFIG.POLL_QUESTIONS[0].id);
      updateCardLocks();
    }

    function setActiveQuestion(questionId) {
      document.querySelectorAll(".question-card").forEach(card => {
        card.classList.toggle("active", card.dataset.questionId === questionId);
      });
    }

    function openQuestion(questionId) {
      if (!canOpenQuestion(questionId)) {
        showToast("आधी पहिल्या प्रश्नाचे उत्तर निवडा", "info");
        return;
      }
      setActiveQuestion(questionId);
    }

    function canOpenQuestion(questionId) {
      const questionIndex = CONFIG.POLL_QUESTIONS.findIndex(question => question.id === questionId);
      return CONFIG.POLL_QUESTIONS
        .slice(0, questionIndex)
        .every(question => answers[question.id]);
    }

    function updateCardLocks() {
      CONFIG.POLL_QUESTIONS.forEach(question => {
        const card = document.querySelector(`.question-card[data-question-id="${question.id}"]`);
        card.classList.toggle("locked", !canOpenQuestion(question.id));
      });
    }

    function selectAnswer(questionId, optionId) {
      if (!canOpenQuestion(questionId)) return;

      const question = CONFIG.POLL_QUESTIONS.find(entry => entry.id === questionId);
      const option = question.options.find(entry => entry.id === optionId);
      answers[questionId] = option;

      const card = document.querySelector(`.question-card[data-question-id="${questionId}"]`);
      card.classList.add("answered");
      card.querySelectorAll(".yes-no-btn").forEach(button => {
        button.classList.toggle("selected", button.dataset.optionId === optionId);
      });
      document.querySelector(`[data-answer-pill="${questionId}"]`).textContent = option.label;

      const nextQuestion = CONFIG.POLL_QUESTIONS.find(question => !answers[question.id]);
      if (nextQuestion) {
        setActiveQuestion(nextQuestion.id);
      } else {
        setActiveQuestion(null);
      }

      updateCardLocks();
      document.getElementById("submitBtn").disabled = CONFIG.POLL_QUESTIONS.some(question => !answers[question.id]);
    }

    function formatQuestion(text) {
      return text.replace("{date}", getTodayDisplay());
    }

    async function submitResponse() {
      if (CONFIG.POLL_QUESTIONS.some(question => !answers[question.id])) return;

      const btn = document.getElementById("submitBtn");
      btn.disabled = true;

      const responseAnswers = CONFIG.POLL_QUESTIONS.map(question => ({
        questionId: question.id,
        questionTitle: question.title,
        question: formatQuestion(question.text),
        selectedOption: answers[question.id].id,
        optionText: answers[question.id].label
      }));

      const sevaAnswer = responseAnswers.find(answer => answer.questionId === "seva") || responseAnswers[0];
      const payload = {
        date: getTodayISO(),
        studentName: student,
        question: sevaAnswer.question,
        selectedOption: sevaAnswer.selectedOption,
        optionText: sevaAnswer.optionText,
        answers: responseAnswers
      };

      try {
        await saveResponse(payload);
        showToast("✓ आपले उत्तर नोंदवले गेले!");
        setTimeout(() => {
          window.location.href = "daily.html";
        }, 900);
      } catch (error) {
        btn.disabled = false;
        showToast(error.message || "उत्तर जतन झाले नाही", "error");
      }
    }
  </script>
</body>
</html>
