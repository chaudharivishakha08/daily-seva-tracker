<!DOCTYPE html>
<html lang="mr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>श्री स्वामी समर्थ - Results</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; }
    .page-body { flex: 1; padding: 24px 20px 40px; max-width: 1180px; margin: 0 auto; width: 100%; }
    .filter-bar { background: var(--white); border-radius: var(--r-lg); border: 1px solid var(--border); padding: 18px 20px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 22px; box-shadow: var(--shadow-sm); }
    .filter-group { display: flex; align-items: center; gap: 8px; }
    .filter-group label { font-size: 0.78rem; font-weight: 700; color: var(--text-light); white-space: nowrap; }
    .filter-group input[type="date"] { padding: 8px 12px; border: 1.5px solid var(--border); border-radius: var(--r-sm); font-family: "Inter", sans-serif; font-size: 0.85rem; color: var(--text-dark); background: var(--cream); outline: none; }
    .filter-group input[type="date"]:focus { border-color: var(--saffron); }
    .sep { color: var(--border); font-size: 1.2rem; }
    .tabs-row { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; flex-wrap: wrap; }
    .student-view, .option-view, .weekly-view { display: flex; flex-direction: column; gap: 16px; }
    .table-card { background: var(--white); border-radius: var(--r-lg); border: 1px solid var(--border); overflow: hidden; box-shadow: var(--shadow-sm); }
    .table-toolbar { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .tbl-title { font-size: 0.88rem; font-weight: 700; color: var(--text-mid); }
    .search-box { position: relative; flex: 1; min-width: 180px; max-width: 280px; }
    .question-result-block { display: flex; flex-direction: column; gap: 12px; }
    .question-result-title { font-family: "Tiro Devanagari Marathi", serif; font-size: 1.05rem; color: var(--text-dark); font-weight: 700; }
    .opt-detail-card { background: var(--white); border-radius: var(--r-lg); border: 1px solid var(--border); padding: 18px 20px; box-shadow: var(--shadow-sm); display: flex; align-items: center; gap: 18px; }
    .odc-left { display: flex; flex-direction: column; align-items: center; gap: 4px; min-width: 64px; }
    .odc-badge { min-width: 44px; height: 44px; padding: 0 12px; border-radius: 14px; background: linear-gradient(135deg, var(--saffron), var(--saffron-dark)); color: white; font-weight: 800; font-size: 1rem; display: flex; align-items: center; justify-content: center; }
    .odc-count { font-size: 1.45rem; font-weight: 800; color: var(--text-dark); }
    .odc-label { font-size: 0.72rem; color: var(--text-light); font-weight: 600; }
    .odc-right { flex: 1; }
    .odc-text { font-family: "Tiro Devanagari Marathi", serif; font-size: 1rem; color: var(--text-dark); line-height: 1.5; margin-bottom: 8px; }
    .odc-names { display: flex; gap: 6px; flex-wrap: wrap; }
    .name-chip { padding: 3px 10px; background: var(--saffron-bg); border: 1px solid var(--saffron-light); border-radius: 20px; font-size: 0.75rem; color: var(--text-mid); font-weight: 500; }
    .odc-bar-wrap { height: 6px; background: var(--border); border-radius: 4px; overflow: hidden; margin-top: 10px; }
    .odc-bar { height: 100%; background: linear-gradient(90deg, var(--saffron-light), var(--saffron)); border-radius: 4px; }
    .weekly-option { font-weight: 700; margin-right: 4px; }
    .weekly-missing { color: var(--text-light); opacity: 0.55; }
    .state { text-align: center; padding: 40px 20px; color: var(--text-light); }
    .state span { font-size: 2rem; display: block; margin-bottom: 8px; }
    .denied { display: none; text-align: center; padding: 60px 20px; color: var(--danger); }
    .denied span { font-size: 3rem; display: block; margin-bottom: 12px; }
  </style>
</head>
<body>
  <div class="top-bar">
    <button class="icon-btn" onclick="window.location.href='index.html'">← मागे</button>
    <span class="top-bar-title">श्री स्वामी समर्थ</span>
    <div style="width:80px;"></div>
  </div>

  <div class="page-body">
    <div class="denied" id="deniedMsg">
      <span>🔒</span>
      <h2>Access Denied</h2>
      <p style="color:var(--text-light);margin-top:8px;">फक्त अधिकृत व्यक्तींसाठी</p>
    </div>

    <div id="mainContent" style="display:none;">
      <div class="filter-bar">
        <div class="filter-group">
          <label>FROM</label>
          <input type="date" id="fromDate"/>
        </div>
        <span class="sep">→</span>
        <div class="filter-group">
          <label>TO</label>
          <input type="date" id="toDate"/>
        </div>
        <button class="btn btn-primary btn-sm" id="loadBtn">Load</button>
        <div style="margin-left:auto;display:flex;gap:8px;align-items:center;">
          <span style="font-size:0.82rem;color:var(--text-light);font-weight:600;" id="rangeInfo"></span>
        </div>
      </div>

      <div class="tabs-row">
        <div class="tabs">
          <button class="tab active" id="tabStudent">👤 Student Specific</button>
          <button class="tab" id="tabOption">📊 Option Specific</button>
          <button class="tab" id="tabWeekly">📅 Weekly Progress</button>
        </div>
        <span style="font-size:0.82rem;color:var(--text-light);" id="totalInfo"></span>
      </div>

      <div class="student-view" id="studentView">
        <div class="table-card">
          <div class="table-toolbar">
            <span class="tbl-title">प्रत्येक विद्यार्थ्याची निवड</span>
            <div class="search-box">
              <span class="search-icon">🔍</span>
              <input type="text" id="searchInput" placeholder="नाव शोधा..."/>
            </div>
          </div>
          <div class="tbl-wrap" style="border-radius:0;border:none;">
            <table>
              <thead>
                <tr id="studentHead"></tr>
              </thead>
              <tbody id="studentBody"></tbody>
            </table>
          </div>
          <div class="state" id="studentEmpty" style="display:none;"><span>👤</span><p>डेटा नाही</p></div>
        </div>
      </div>

      <div class="option-view" id="optionView" style="display:none;">
        <div id="optionCards"></div>
        <div class="state" id="optionEmpty" style="display:none;"><span>📊</span><p>डेटा नाही</p></div>
      </div>

      <div class="weekly-view" id="weeklyView" style="display:none;">
        <div class="table-card">
          <div class="table-toolbar">
            <span class="tbl-title">Weekly Progress</span>
            <div class="search-box">
              <span class="search-icon">🔍</span>
              <input type="text" id="weeklySearchInput" placeholder="नाव शोधा..."/>
            </div>
          </div>
          <div class="tbl-wrap" style="border-radius:0;border:none;">
            <table>
              <thead>
                <tr id="weeklyHead"></tr>
              </thead>
              <tbody id="weeklyBody"></tbody>
            </table>
          </div>
          <div class="state" id="weeklyEmpty" style="display:none;"><span>📅</span><p>डेटा नाही</p></div>
        </div>
      </div>

      <div class="state" id="loadState"><span>🙏</span><p>तारीख निवडा</p></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="config.js"></script>
  <script type="module">
    import { getResponsesByRange, getStudents } from "./firebase-client.js";

    let currentTab = "student";
    let allRows = [];
    let allStudentNames = [];
    let studentRows = [];
    let weeklyRows = [];
    let weekDates = [];

    document.getElementById("loadBtn").addEventListener("click", load);
    document.getElementById("tabStudent").addEventListener("click", () => switchTab("student"));
    document.getElementById("tabOption").addEventListener("click", () => switchTab("option"));
    document.getElementById("tabWeekly").addEventListener("click", () => switchTab("weekly"));
    document.getElementById("searchInput").addEventListener("input", filterStudents);
    document.getElementById("weeklySearchInput").addEventListener("input", filterWeekly);

    window.addEventListener("DOMContentLoaded", () => {
      if (!isAdmin()) {
        document.getElementById("deniedMsg").style.display = "block";
        return;
      }

      document.getElementById("mainContent").style.display = "block";
      const to = getTodayISO();
      const from = new Date();
      from.setDate(from.getDate() - 6);
      document.getElementById("fromDate").value = from.toISOString().split("T")[0];
      document.getElementById("toDate").value = to;
      load();
    });

    function switchTab(tab) {
      currentTab = tab;
      document.getElementById("tabStudent").className = tab === "student" ? "tab active" : "tab";
      document.getElementById("tabOption").className = tab === "option" ? "tab active" : "tab";
      document.getElementById("tabWeekly").className = tab === "weekly" ? "tab active" : "tab";
      document.getElementById("studentView").style.display = tab === "student" ? "flex" : "none";
      document.getElementById("optionView").style.display = tab === "option" ? "flex" : "none";
      document.getElementById("weeklyView").style.display = tab === "weekly" ? "flex" : "none";
    }

    async function load() {
      const from = document.getElementById("fromDate").value;
      const to = document.getElementById("toDate").value;
      if (!from || !to) {
        showToast("तारीख निवडा", "error");
        return;
      }

      try {
        const [rows, students] = await Promise.all([
          getResponsesByRange(from, to),
          getStudents()
        ]);
        allRows = rows;
        allStudentNames = students;
        weekDates = buildDateRange(from, to);
        processData();
        document.getElementById("rangeInfo").textContent = `${from} → ${to}`;
        document.getElementById("totalInfo").textContent = `${rows.length} total responses`;
        document.getElementById("loadState").style.display = rows.length ? "none" : "block";
        switchTab(currentTab);
      } catch (error) {
        showToast("Results load झाले नाहीत", "error");
      }
    }

    function processData() {
      renderStudentTable();
      renderOptionCards();
      renderWeeklyTable();
    }

    function getAnswer(row, questionId) {
      if (Array.isArray(row.answers)) {
        return row.answers.find(answer => answer.questionId === questionId);
      }
      if (questionId === "seva") {
        return {
          questionId: "seva",
          selectedOption: row.selectedOption,
          optionText: row.optionText
        };
      }
      return null;
    }

    function renderStudentTable() {
      const studentMap = {};
      const sevaQuestion = CONFIG.POLL_QUESTIONS.find(question => question.id === "seva");
      const parentsQuestion = CONFIG.POLL_QUESTIONS.find(question => question.id === "parents_namaskar");

      allRows.forEach(row => {
        if (!studentMap[row.studentName]) {
          studentMap[row.studentName] = { total: 0, seva: {}, parents_namaskar: {} };
          sevaQuestion.options.forEach(option => studentMap[row.studentName].seva[option.id] = 0);
          parentsQuestion.options.forEach(option => studentMap[row.studentName].parents_namaskar[option.id] = 0);
        }

        const sevaAnswer = getAnswer(row, "seva");
        const parentsAnswer = getAnswer(row, "parents_namaskar");
        if (sevaAnswer?.selectedOption) studentMap[row.studentName].seva[sevaAnswer.selectedOption]++;
        if (parentsAnswer?.selectedOption) studentMap[row.studentName].parents_namaskar[parentsAnswer.selectedOption]++;
        studentMap[row.studentName].total++;
      });

      studentRows = Object.entries(studentMap).sort((a, b) => a[0].localeCompare(b[0]));
      paintStudentTable(studentRows);
    }

    function paintStudentTable(rows) {
      const head = document.getElementById("studentHead");
      const tbody = document.getElementById("studentBody");
      const emEl = document.getElementById("studentEmpty");
      const sevaQuestion = CONFIG.POLL_QUESTIONS.find(question => question.id === "seva");
      const parentsQuestion = CONFIG.POLL_QUESTIONS.find(question => question.id === "parents_namaskar");

      head.innerHTML = `
        <th>#</th>
        <th>नाव / Name</th>
        ${sevaQuestion.options.map(option => `<th>सेवा ${option.id}</th>`).join("")}
        ${parentsQuestion.options.map(option => `<th>नमस्कार ${option.label}</th>`).join("")}
        <th>एकूण</th>
      `;
      tbody.innerHTML = "";

      if (!rows.length) {
        emEl.style.display = "block";
        return;
      }
      emEl.style.display = "none";

      rows.forEach(([name, counts], index) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td style="color:var(--text-light);font-size:0.82rem;">${index + 1}</td>
          <td style="font-weight:600;"> ${name}</td>
          ${sevaQuestion.options.map(option => `<td><span class="badge badge-${option.id}" style="${counts.seva[option.id] ? "" : "opacity:0.3;"}">${counts.seva[option.id] || 0}</span></td>`).join("")}
          ${parentsQuestion.options.map(option => `<td><span class="badge" style="${counts.parents_namaskar[option.id] ? "" : "opacity:0.3;"}">${counts.parents_namaskar[option.id] || 0}</span></td>`).join("")}
          <td style="font-weight:700;color:var(--saffron-dark);">${counts.total}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    function filterStudents() {
      const q = document.getElementById("searchInput").value.toLowerCase();
      paintStudentTable(studentRows.filter(([name]) => name.toLowerCase().includes(q)));
    }

    function renderOptionCards() {
      const container = document.getElementById("optionCards");
      const emEl = document.getElementById("optionEmpty");
      container.innerHTML = "";

      if (!allRows.length) {
        emEl.style.display = "block";
        return;
      }
      emEl.style.display = "none";

      CONFIG.POLL_QUESTIONS.forEach(question => {
        const block = document.createElement("div");
        block.className = "question-result-block";
        block.innerHTML = `<div class="question-result-title">${formatQuestion(question.text)}</div>`;

        question.options.forEach(option => {
          const names = allRows
            .filter(row => getAnswer(row, question.id)?.selectedOption === option.id)
            .map(row => row.studentName);
          const count = names.length;
          const pct = allRows.length ? Math.round((count / allRows.length) * 100) : 0;

          const card = document.createElement("div");
          card.className = "opt-detail-card";
          card.innerHTML = `
            <div class="odc-left">
              <div class="odc-badge">${option.id.length === 1 ? option.id : option.label}</div>
              <div class="odc-count">${count}</div>
              <div class="odc-label">${pct}%</div>
            </div>
            <div class="odc-right">
              <div class="odc-text">${option.label}</div>
              <div class="odc-names">${[...new Set(names)].map(name => `<span class="name-chip"> ${name}</span>`).join("")}</div>
              <div class="odc-bar-wrap"><div class="odc-bar" style="width:${pct}%"></div></div>
            </div>
          `;
          block.appendChild(card);
        });

        container.appendChild(block);
      });
    }

    function renderWeeklyTable() {
      const responseNames = allRows.map(row => row.studentName);
      const names = [...new Set([...allStudentNames, ...responseNames])].sort((a, b) => a.localeCompare(b));
      const byStudent = {};

      names.forEach(name => {
        byStudent[name] = {};
      });

      allRows.forEach(row => {
        if (!byStudent[row.studentName]) byStudent[row.studentName] = {};
        byStudent[row.studentName][row.date] = {
          seva: getAnswer(row, "seva")?.selectedOption || "",
          parents: getAnswer(row, "parents_namaskar")?.optionText || ""
        };
      });

      weeklyRows = Object.entries(byStudent);
      paintWeeklyTable(weeklyRows);
    }

    function paintWeeklyTable(rows) {
      const head = document.getElementById("weeklyHead");
      const tbody = document.getElementById("weeklyBody");
      const emEl = document.getElementById("weeklyEmpty");
      head.innerHTML = `
        <th>#</th>
        <th>नाव / Name</th>
        ${weekDates.map(date => `<th>${formatWeeklyHeader(date)}</th>`).join("")}
      `;
      tbody.innerHTML = "";

      if (!rows.length) {
        emEl.style.display = "block";
        return;
      }
      emEl.style.display = "none";

      rows.forEach(([name, selections], index) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td style="color:var(--text-light);font-size:0.82rem;">${index + 1}</td>
          <td style="font-weight:600;"> ${name}</td>
          ${weekDates.map(date => {
            const value = selections[date];
            return value
              ? `<td><span class="badge badge-${value.seva} weekly-option">${value.seva}</span><span>${value.parents || "-"}</span></td>`
              : `<td><span class="weekly-missing">-</span></td>`;
          }).join("")}
        `;
        tbody.appendChild(tr);
      });
    }

    function filterWeekly() {
      const q = document.getElementById("weeklySearchInput").value.toLowerCase();
      paintWeeklyTable(weeklyRows.filter(([name]) => name.toLowerCase().includes(q)));
    }

    function formatQuestion(text) {
      return text.replace("{date}", getTodayDisplay());
    }

    function buildDateRange(from, to) {
      const dates = [];
      const cursor = parseISODate(from);
      const end = parseISODate(to);

      while (cursor <= end) {
        dates.push(formatISODate(cursor));
        cursor.setDate(cursor.getDate() + 1);
      }

      return dates;
    }

    function parseISODate(value) {
      const [year, month, day] = value.split("-").map(Number);
      return new Date(year, month - 1, day);
    }

    function formatISODate(date) {
      return [
        date.getFullYear(),
        String(date.getMonth() + 1).padStart(2, "0"),
        String(date.getDate()).padStart(2, "0")
      ].join("-");
    }

    function formatWeeklyHeader(date) {
      const labels = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
      const parsed = parseISODate(date);
      return `${labels[parsed.getDay()]} (${parsed.getDate()})`;
    }
  </script>
</body>
</html>
